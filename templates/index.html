<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minha LLM</title>
    <style>
        body { background: #0b0d11; color: #fff; font-family: 'Courier New', monospace; padding: 50px; text-align: center; }
        .box { background: #1a1d23; border: 1px solid #00ff95; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        #log { height: 200px; overflow-y: auto; text-align: left; background: #000; padding: 10px; margin-bottom: 20px; color: #00ff95; border-radius: 5px; }
        input { width: 70%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; }
        button { padding: 10px; background: #00ff95; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>NEURAL NETWORK V3</h3>
        <div id="log">Aguardando comando...</div>
        <input type="text" id="in" placeholder="Escreva algo...">
        <button onclick="falar()">ENVIAR</button>
    </div>
    <script>
        async function falar() {
            const i = document.getElementById('in');
            const l = document.getElementById('log');
            l.innerHTML += `<br><b>Você:</b> ${i.value}`;
            const r = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({msg: i.value})
            });
            const d = await r.json();
            l.innerHTML += `<br><b>IA:</b> ${d.answer}`;
            i.value = '';
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html
